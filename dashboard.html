<!DOCTYPE html>
<html>
<head>
  <title>User Register Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      width: 980px;
      max-width: 100%;
    }

    h2 {
      text-align: center;
      margin: 0 0 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #2f3b52;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .refresh-btn {
      background: #007bff;
    }

    .card {
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      background: #f8fafc;
    }

    .uid-text {
      font-size: 12px;
      color: #4a5568;
      word-break: break-all;
      margin-bottom: 6px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
    }

    th, td {
      border: 1px solid #e2e8f0;
      padding: 8px;
      text-align: left;
      font-size: 13px;
    }

    th {
      background: #eef2f7;
    }

    .self-row {
      background: #e9f7ff;
    }

    .uid-cell {
      min-width: 270px;
      word-break: break-all;
    }

    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #2d3748;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>User Register Dashboard</h2>

    <div class="topbar">
      <div class="actions">
        <button onclick="goToApp()">Go to App</button>
        <button class="refresh-btn" onclick="refreshDashboard()">Refresh</button>
      </div>
    </div>

    <div class="card">
      <div class="uid-text">Your User ID: <span id="userIdValue">-</span></div>
      <div>Used today: <span id="usageCount">0 / 3</span></div>
      <div id="remainingCount">Remaining today: 3</div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>User ID</th>
            <th>Date</th>
            <th>Used</th>
            <th>Limit</th>
            <th>Remaining</th>
          </tr>
        </thead>
        <tbody id="registerBody">
          <tr>
            <td colspan="5">No users yet</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="status"></div>
  </div>

  <script>
    const UID_KEY = "bg_remover_uid";
    const API_KEY_STORAGE = "bg_api_key";

    function getUid() {
      return localStorage.getItem(UID_KEY);
    }

    function setUid(uid) {
      localStorage.setItem(UID_KEY, uid);
      document.getElementById("userIdValue").innerText = uid;
    }

    function getApiKey() {
      return localStorage.getItem(API_KEY_STORAGE);
    }

    function setUsageOnDashboard(used, limit) {
      const safeUsed = Number.isFinite(used) ? used : 0;
      const safeLimit = Number.isFinite(limit) ? limit : 3;
      const remaining = Math.max(0, safeLimit - safeUsed);
      document.getElementById("usageCount").innerText = safeUsed + " / " + safeLimit;
      document.getElementById("remainingCount").innerText = "Remaining today: " + remaining;
    }

    function renderRegister(users) {
      const body = document.getElementById("registerBody");
      const currentUid = getUid();

      if (!users || users.length === 0) {
        body.innerHTML = "<tr><td colspan='5'>No users yet</td></tr>";
        return;
      }

      body.innerHTML = "";

      users.forEach(function(user) {
        const row = document.createElement("tr");
        if (user.uid === currentUid) {
          row.classList.add("self-row");
        }

        row.innerHTML =
          "<td class='uid-cell'>" + user.uid + "</td>" +
          "<td>" + user.date + "</td>" +
          "<td>" + user.used + "</td>" +
          "<td>" + user.limit + "</td>" +
          "<td>" + user.remaining + "</td>";

        body.appendChild(row);
      });
    }

    async function initializeUser() {
      const apiKey = getApiKey();
      if (!apiKey) {
        throw new Error("API key missing. Open app.html and save API key first.");
      }

      const existingUid = getUid();
      if (existingUid) {
        setUid(existingUid);
        return existingUid;
      }

      const response = await fetch("http://127.0.0.1:5000/api/v1/session", {
        method: "POST",
        headers: {
          "x-api-key": apiKey
        }
      });

      if (!response.ok) {
        if (response.status === 401) {
          throw new Error("Invalid API Key. Update it in app.html");
        }
        throw new Error("Could not create user session");
      }

      const data = await response.json();
      setUid(data.uid);
      return data.uid;
    }

    async function updateUsage() {
      const response = await fetch("http://127.0.0.1:5000/api/v1/usage", {
        method: "GET",
        headers: {
          "x-user-id": getUid(),
          "x-api-key": getApiKey()
        }
      });

      if (!response.ok) {
        throw new Error("Unable to refresh usage");
      }

      const data = await response.json();
      setUsageOnDashboard(data.used, data.limit);
    }

    async function updateRegister() {
      const response = await fetch("http://127.0.0.1:5000/api/v1/users", {
        method: "GET",
        headers: {
          "x-api-key": getApiKey()
        }
      });

      if (!response.ok) {
        throw new Error("Unable to refresh register");
      }

      const data = await response.json();
      renderRegister(data.users);
    }

    async function refreshDashboard() {
      const status = document.getElementById("status");
      status.innerText = "Refreshing...";
      try {
        await updateUsage();
        await updateRegister();
        status.innerText = "Updated";
      } catch (e) {
        status.innerText = e.message;
      }
    }

    function goToApp() {
      window.location.href = "app.html";
    }

    (async function init() {
      try {
        await initializeUser();
        await refreshDashboard();
      } catch (e) {
        document.getElementById("status").innerText = "Failed to initialize dashboard";
      }
    })();
  </script>
</body>
</html>
